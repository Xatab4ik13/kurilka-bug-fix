name: Deploy frontend to Timeweb

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-timeweb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TIMEWEB_SSH_HOST: ${{ secrets.TIMEWEB_SSH_HOST }}
      TIMEWEB_SSH_USER: ${{ secrets.TIMEWEB_SSH_USER }}
      TIMEWEB_SSH_PORT: ${{ secrets.TIMEWEB_SSH_PORT }}
      TIMEWEB_TARGET_DIR: ${{ secrets.TIMEWEB_TARGET_DIR }}
      TIMEWEB_SSH_PRIVATE_KEY: ${{ secrets.TIMEWEB_SSH_PRIVATE_KEY }}
      TIMEWEB_SSH_KNOWN_HOSTS: ${{ secrets.TIMEWEB_SSH_KNOWN_HOSTS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Validate required deploy secrets
        run: |
          test -n "$TIMEWEB_SSH_HOST"
          test -n "$TIMEWEB_SSH_USER"
          test -n "$TIMEWEB_TARGET_DIR"
          test -n "$TIMEWEB_SSH_PRIVATE_KEY"

      - name: Configure SSH access
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$TIMEWEB_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [ -n "$TIMEWEB_SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$TIMEWEB_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${TIMEWEB_SSH_PORT:-22}" "$TIMEWEB_SSH_HOST" >> ~/.ssh/known_hosts
          fi

          chmod 644 ~/.ssh/known_hosts

      - name: Ensure target directory exists
        run: |
          ssh -p "${TIMEWEB_SSH_PORT:-22}" "$TIMEWEB_SSH_USER@$TIMEWEB_SSH_HOST" "mkdir -p '$TIMEWEB_TARGET_DIR'"

      - name: Upload dist to Timeweb
        run: |
          rsync -az --delete \
            -e "ssh -p ${TIMEWEB_SSH_PORT:-22}" \
            dist/ "$TIMEWEB_SSH_USER@$TIMEWEB_SSH_HOST:$TIMEWEB_TARGET_DIR/"
